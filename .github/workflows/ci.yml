name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/ invariants/

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      pytest_exit: ${{ steps.pytest.outputs.exit_code }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - id: pytest
        run: |
          set +e
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true
      - name: Upload CI artifacts for kernel
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: ci-results.json
      - name: Write CI results JSON
        run: |
          python3 -c "
          import json, os
          results = {
              'pytest': {
                  'exit_code': int('${{ steps.pytest.outputs.exit_code }}'),
                  'tests_passed': int('${{ steps.pytest.outputs.exit_code }}') == 0,
              },
              'ruff': 'pass',
              'mypy': 'pending',
          }
          with open('ci-results.json', 'w') as f:
              json.dump(results, f, indent=2)
          "
      - name: Fail if tests failed
        if: steps.pytest.outputs.exit_code != '0'
        run: exit 1

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-dev.txt
      - run: mypy src/

  alga-fold-kernel:
    name: Kernel Gate
    runs-on: ubuntu-latest
    needs: [test, typecheck]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff

      - name: Build CI artifacts JSON
        run: |
          python3 -c "
          import json
          results = {
              'pytest': {
                  'exit_code': int('${{ needs.test.outputs.pytest_exit || 0 }}'),
                  'tests_passed': int('${{ needs.test.outputs.pytest_exit || 0 }}') == 0,
              },
              'ruff': 'pass',
              'mypy': 'pass',
          }
          with open('/tmp/ci-artifacts.json', 'w') as f:
              json.dump(results, f, indent=2)
          "

      - name: Run ALGA_FOLD_KERNEL
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          python scripts/alga_fold_kernel.py \
            --pr "$PR_NUMBER" \
            --commit "$COMMIT_SHA" \
            --actor "$ACTOR" \
            --mode merge \
            --diff-file /tmp/pr.diff \
            --ci-artifacts /tmp/ci-artifacts.json \
            --repo-root .

      - name: Upload kernel decision
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-decision
          path: ops/ledger/kernel-decisions.jsonl
